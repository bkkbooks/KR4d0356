body:
  text: 雪磯叢稿别集類三宋提要臣等謹案雪磯叢稿五卷宋樂雷發撰雷發字聲逺寧逺人纍舉不第寶祐元年其門人姚勉登科上疏請以讓雷發理宗詔親試對選舉八事賜特科第一人然竟不仕以終居於雪磯自號雪磯先生因以名其詩稿雷發人品頗髙而集中有謁易祓山齊詩乃結契於蘇師旦之黨殊不可解然考祓與師旦牽連同敗在韓托胄敗之前而詩稱淳熙人物到嘉熙見說山齊亦白髭則在祓竄謫之後二十餘年非有勢熖之可附殆以祓究心經學尊前輩舊人故略其瑕垢而交之固不足以纍雷發也其詩舊在江湖集中而風骨頗遒調亦瀏亮實無猥雜粗俚之弊視江湖一派迥殊如寄姚雪篷寄許介之送丁少卿讀繫年録諸篇尚有杜牧許渾遺意即秋日村路絶句一路稻花誰是主紅蜻蜓伴緑螳螂之類雖涉纎仄亦無俗韻正未可以名不甚著忽之矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀雪磯叢稿原序僕非能詩者而亦好作詩蚤遊諸老之門或謂可與言詩比歲渝江羅季海西湖胡雪江間亦採而刋之然傳録失真甚則雜以他人之作以魚目而混驪珠僕得盜名之譏矣其可乎前歲歸自京師繼罹憂患蓋不復言詩也嘗得李抑抄書必欲為之刻梓即嘗謝之繼而友人朱嗣賢何堯卿捐泉市梓又有請焉辭之再四而請益堅余詩本無可傳而諸賢之軫念者如此僕不得辭矣竊念蚤歲雕鏤纂組溺志詞章既而悔之方將鞭辟近裏以進聖賢之學其敢以詩傳哉古今言詩莫尚於老杜嘗有詩曰文章一小技於道未為尊僕果能詩猶犯老杜之戒况不能詩乎知道者當亮僕之心而有以教之可也時寶祐丁巳朔樂雷發書
