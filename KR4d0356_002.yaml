body:
  text: 雪磯叢稿卷二宋樂雷發撰律詩寄雪篷姚使君湘鱗六六寄相思疏栁新蟬想别時今夜各聽三楚鴈秋風又老一年詩梅花且補離騷闕薏苡應為史筆知剪竹疑峰新製笛待衝霜月訪桓伊使君時寓衡陽謁山齋先生易尚書淳熙人物到嘉熙聽説山齋亦白髭文字盡傳融水後精神如戰辟雍時靈椿終不孚朝菌蓍草難堪養夀龜細撚梅花看總義只應姬老是相知送桂師鍾尚書赴召老依牙纛撚吟髭又折梅花話别思五嶺不遮鸞鳳詔四方俱誦鱒魴詩人才晉魏凋零後國事江淮倥偬時賴有老臣經濟在快呼桂醑餞篙師題鍾尚書北征詩稿野雉江鷗滿故都秋風禾黍撚吟鬚六千里外驅旃斾五十篇中見版圖金鉉尚期扶日御玉衡終令正天衢書生亦有中原志那得君王丈二殳呈廣西張提刑陸續城邊按部歸梅花隨處撲征騑溪山有助吟題遍獄市無寃訟牒稀竹屋呼猿眠碎月莎庭引鶴步斜暉莫嫌瘴霧侵湘客滿路風霜冷枲衣罪言愁殺瀟濵蟣虱臣亂山斜照獨含情人材不似深衣古國勢如何楮幣輕石燕未蘇湘國旱木牛那濟蜀州兵幸無杜老流離苦切莫吟詩到北征間居自遣雨積桑樞長昔邪誰能載酒訪揚家漢庭用少臣今老魯俗皆冠我獨髿憂國苦無蠲忿草看書喜對決明花衰頽懶作江湖夢擬斸三丫養鬢華又許由溪上小屠蘇紅樹蒼山對一臞白髮功名惟劒在青山活計併鍾無誰言荆楚多竒士却笑乾坤一腐儒桐帽貂冠俱有分寄言兒輩莫揶揄寄樓居朱漕住近江心古寺邊幅巾應伴浙僧間官銜自古金陵觀冠缺多依鴈蕩山出處皆留青史看功名且逐白雲還殷勤為祝樓居好月照橫舟送碧灣呈姚雪篷使君祝融應自勝崆洞且讀通書辨聖功事可語人甘受謗詩能名世不嫌窮春邊採藥收湘芷月下調絃送楚鴻賴有行人碑尚在棠隂依舊戀東風雪篷見示送趙東巖詩皇華歌徹酒杯忙澤畔騷翁送范滂琴帶衡雲弦索潤馬餐湘􅉅轡絲香山中貍豹隨吟斾部內豺狼入按章却笑詩寒吟骨聳愁看酬唱挾風霜書蕭千嵒集向來陽陸共峥嶸吟到停雲趣轉精古似洞庭張雅樂嚴如即墨斂殘兵茵陳終不肥方朔芣苡何堪病冉耕細讀殘編搔白首未應造物忌詩名滕王閣下賦越􅞤蜀艇亂相偎風飽千帆帶雨開閣上鳴鸞今已往江頭飛鶩只堪哀栁汀絮滿河豚賤桃塢花殘石首來應接溪山吾不暇自憐白髮欠詩材宿金灘瀧吏崖翁是賞音江流泯泯對秋吟天蝦撲火帆檣晚水狗捎魚島嶼深千里庭闈雲滿眼十年湖海鴈驚心今宵客枕清如水穩讀西山夜氣針寄許介之贏得詩名遍九州酒徒棊伴半公侯離騷甘隱魚鱗屋樂府多傳鸛鵲樓醉葉幾窠藏菊徑蠧荷三畝護漁舟中原應有樓蘭國空鎖吳鈎到白頭聞邊報寄姚雪篷淮烽蜀燧照邊隅白髮憂時我腐儒楚客汀洲搴杜若齊王沮澤索柴胡耽吟自愛南遊好久謫曽謀北事無擬對祝融捫蝨語何時重捋使君鬚寄戴石屏曾到元郎吟處吟雪􅏃煙艇久相尋鳳鳴道國空詩句鴈到衡峰只信音拾橡祠邊聽雨細紉蘭院裡夜分衾蹇驢儻遂黃花約鴉觜敲煙共掘參時石屏訪雪篷于衡陽戊戌冬僕客桂林雪中趙叔愚司理書張司業逢賈島絶句為寄今冬對雪感而有作朔風桂水浸瓊沙曾共騷翁理釣槎對客又吟端木棄疑誤論詩還憶欵冬花飢能驅我瓶儲罄老不饒人鏡影華擬喚扁舟尋剡叟嶺梅瀟菊各天涯寄仙巢先生鍾尚書吹香亭上送飛鴻且把行藏寄蜀桐老境只須尋逺志世途還要避沙蟲公行天地初何憾道在丘園固未窮曽是轅門投卷客應憐聽雪卧蕯藭寄蕭太山兄弟梅花好處共心期曽擷天葩寄夢思兄弟自為千古計江湖方誦二蕭詩貪泉定喜逢亷吏倭國何應拜老師蕭頴士事賸擬尋君攀桂樹路遙誰肯借驢騎蕭君見豫有梅花且補離騷闕之句為之擊節雖未相識蒙書二十首為寄故首句及之送丁少卿自桂帥移鎮西蜀瓊海收兵玉帳間又移齋艦􅑴浯灣三邊形勢全憑蜀四路封疆半是山魏將舊聞侵劒閣漢兵今欲卷函關時會有三京之役細傾瑞露論西事想在元戎指畫間訾家洲竹塢松灣遍履痕斷碑無首野苔昏江山應識前賢事裴稱疑誤今存幾世孫島霧海霞留古意春猿秋鶴冷騷魂何人會得登臨意間嚼梅花伴酒樽慈氏閣崢嶸梵閣礙銀潢且對畦衣問馬王落日斷霞連楚粵缺鐘壞像雜梁唐英豪已往雄圖歇棟宇猶存古意荒惆悵石湖題柱在倚闌無句獨凄涼雉山寺宋永初中有僧西顒誦法華經於此白雉聽之而化至唐黃梅五祖弟子喜登告祖乞巡禮五祖應以遇雉即止後至此開山本朝王初寮有留題蘚碑蘿石擁嵒扃獨倚笻枝問大乘白雉苦無千歲種青山空識六朝僧詩傳北嶽刋新帖禪接西淮冷舊燈擬鑿氷泓澆凍硯禊亭間借法華謄擬遊長沙至零陵忽動歸興擬尋禹柏過長沙且泊愚溪問酒家歲旱可能飛石燕秋高還看落天蝦乾坤納納催霜鬢岐路悠悠又菊花惆悵草黃騏驥病歸心依舊繞煙霞袁家渴泊舟往事誰能問水濵停橈仍是薄西曛樵漁空自存袁姓鳬鴈何應識栁文釣艇分燈歸客艇嶺雲拖雨接溪雲楩櫚蘭芷今何在空使行人誤舊聞小檥袁家窠竹居買酒江繞衡門接旅津鯉魚風歇水粼粼湘醨三盞澆吟思瀟碧千竿對老身題壁未能行客醉典琴不用主人貧隔江誰棹高明麗滿載鸕鷀捉錦鱗餞雲壑唐使君赴雍州􅓁簩竹畔擁雙旌回首江籬隔楚汀曽向前賢參學問且教遠俗識儀刑安南兵息烽煙冷羅殿馬來蠻草青悵望鈴齋何處是遙瞻朱雀認詩星歸侍石田茅屋野苔春喜對庭闈話苦辛客路本無如意事瘴鄉惟有蚤回身且尋農耒耕湘雨待看天戈洗塞塵門外黃旗邊餉急可堪杯酒各傷神寄吳茂遠蘇公堤畔繫吟驢知在垂楊第幾株學校文章如畫餅朝廷官爵似呼盧春吟應欠梅花在時事曾言楮幣無惆悵湘湄分袂處今看細雨長蘼蕪送史主簿之鄂就辟囊中秋卷逼唐賢門外侯芭問太玄才大豈堪栖枳棘官清應只友蘭荃湘行又泛君山月淮績曾衝赤壁煙擬借從軍新句看試尋黃帽寄綱船又宦途捷徑在三邊且駐吟船贈馬鞭壯士苦無橫草疑是槊志將軍還用撒花錢敵兵猶未回燕鴨蜀耗何應問杜鵑今日送君無别話看隨郤縠洗狼煙送邵瓜坡試湖南漕舉槐花匝路促湘行閩賦唐詩舊擅聲有志向曾言國事論心何止在科名畢方夜煽杭都火大角秋纏蜀道兵莫作腐儒場屋話琅玕滿腹正須呈送李公浴疑是裕遊臨武嶺梅瀟菊兩關情歲晚江湖載酒行客路欲依嚴挺子瘴鄉已老少遊兄瓦盆且話田家事肉食誰通鈍漢名惆悵韓張亭畔路雪鞭風帽又東征贈江華熊伯巖堂萱營栁伴吟哦黃綬仙翁鬢未皤對客不矜名第貴論心惟在簡編多江頭魴鯉香晨膳境內鴟梟冷夜窠湘國詩盟人寂寞衰頽猶喜識隂何謂隂鏗何遜也江華送熊清父遊廣州時豫有衡陽之役邂逅陽華且酒壺海鵬衡鴈各征途間身俱被飢寒役老境還堪離别無鄉夢定應思欵段客吟何用説娵隅曾從仙叟參玄訣好訪安期採澗蒲喜李景魏就熊伯巖縣尉招長歌白石草廬深今抱園絲就賞音溫飽不為兒輩計行藏端見古人心鱣魚堂上春開帳鸂鶒灘前夜對衾擬挂奚囊梅下聽謫仙應共隱仙吟送友人之辰州覲省跕鳶巢畔瘴雲低山徑如梯去馬遲正則自吟皇樹頌廣微惟誦白華詩春風採藥桃花國落日尋碑薏苡祠覓得丹砂能寄否溪亭送客鬢毛衰雪磯叢稿卷二
