front:
  text: 雪磯叢稿跋
  hash: sha256:c7447b503a6b840c0a6f782f4ce9d5f823fd90158a286a913ccca9b0102dab68
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0356_WYG_006-1a, image: WYG1182/WYG1182-0713a.png}
body:
  text: 愚聞之太上立德其次立功其次立言是謂不朽夫徳藴諸身心功成於事業言見於著述有内外相須體用合一之道焉今岐而言之豈有修諸身不見諸事施於事不見諸言者乎要之人各有長而兼盡為難其有得乎是者誠君子之異于人能不朽而存者也足以語此者其惟我鼻祖雪磯先生乎先生生于有宋叔季方五星聚奎開一代文明之運當時科目得人若吕䝉正之雅量王曾之持正韓琦范仲淹之謀畧司馬光蘇軾之忠直文天祥之節義曰徳曰功曰言表表著于當時難以殫述先生與諸公相後先頴悟警敏博極羣書居家以孝友見稱莅官以忠義自許不為末世流俗所摇奪醖藉甚富所得誠深矣寶祐元年朝廷設科取士先生廷對萬餘言條荅疏暢深切時弊登進士第一官授翰林職司敷文時元兵大起直北多虞公嘗為烏烏歌車攻賦勵志發憤折衝禦侮值時相當權昏庸畏懦竟不能用遂使大志莫酬可慨也已丙辰以病告歸繼罹憂制遂不起復閒居以詩文自遣要其㫖趣幽深𤣥遠温雅和平而其英邁之氣正大之情往往見于言表其所抱負雖不獲少試而經綸康濟之術亦自可見先生之功徳與言可謂並茂矣舊遺叢稿一帙歳久漸以敝訛愚恐格言至論將湮滅無傳重不仁孝之罪也公暇重加訂正期以傳之無窮庶乎公之立言由兹不朽而思見公之功徳者一展巻如在目中將不與吕王韓范司馬蘇文諸公後先嫓美矣乎因録成而遂言之如此成化十七年龍集庚寅賜進士出身户部主事嗣孫宣頓首謹書
  hash: sha256:87c9d8202f06fbec4ccf549e45d86cd33f72d4f57ea41e83319e3da07ef48b1e
