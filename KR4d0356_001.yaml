body:
  text: 雪磯叢稿巻一宋樂雷發撰歌行九疑紫霞洞歌猗歟竒哉紫霞之洞真天開千變萬狀不可述恍疑幻出壺中之蓬萊湘濵兩姝不敢到悵望蒼梧雲縹緲爾來三千三百年斑龍空卧金光草我採姹女江華濵是為三十六帝之外臣右持緑玉杖左攜紫金經長歌天上謡一呼開仙扃列炬照深窈懸身事幽討羣仙喜我來驚笑欲絶倒何侯撫我頂偉遠拍我肩緑華贈我金條脱安期分我紅景丹借問此何地指言太虛天翠霞紫雲張寶幄懸黎結緑盤瓔珞萬疊蒼苔荒石田誰呼青龍耕紫煙虎嶽銅牆未徧識擬開寶藏紬雲帙嵳峩水際披蓑翁應是籛鏗釣神龍仙人仙人何多事驚世駭俗變靈異或跣距足垂天雲或印短趾流沙潯或見姑射處子身粉霞紅綬藕絲帬或示普陀大士形或持簮栁垂寶纓或插鏤象管或結火齊珍或琢𤣥圃玉或布祗園金洞中之深不知㡬百里但見縈紆屈折一里一澗水人言有路通桂林乗興欲尋日華君吾聞洞中大小洞天三十六帝遣列真分治局上界官府應更多定知此洞今誰屬猗歟竒哉紫霞之洞真天開我上㑹稽探禹穴復浮滄海登天台巖谷豈無竒眎此何塵埃摩挱崖石題惡句記我杖屨敲雲來黄涪翁元漫叟目力一生空宇宙澹巖陽華有何竒枉費篇章劖石竇烏烏歌莫讀書莫讀書惠施五車今何如請君為我焚却離騷賦我亦為君擘碎太極圖朅來相就飲斗酒聽我仰天呼烏烏深衣大帶講唐虞不如長纓繫單于吮毫搦管賦子虛不如快鞭躍的盧君不見前年敵兵破巴渝今年敵兵屠成都風塵澒洞兮旂㦸塞途殺人如麻兮流血成湖眉山書院嘶哨馬浣花草堂彎塞弧何人笞中行何人縳可汗何人丸泥封函谷何人三箭定天山大冠若箕兮高劒拄頥朝談回軻兮夕講濓伊綬若若兮印纍纍九州博大兮君今何之有金須碎作僕姑有鐵須鑄作蒺藜我當贈君以湛盧青萍之劒君當報我以太乙白鵲之旗好殺敵人取金印何用區區章句為死諸葛兮能走仲達非孔子兮孰却萊夷噫歌烏烏兮使我心不怡莫讀書成書癡寄雪篷姚使君贈君昆吾湛盧之寶劒青雀黄龍之巨航懸黎垂棘之美玉都梁篤耨之名香佳人佳人在何處濯足洞庭望八荒揭車馡馡薜芷緑欲往從之道阻長倚寶劒兮翼軫膠巨航兮沅湘玉以彰君子禦身之徳香以表騷人流世之芳我所思兮隔秋水天吳翕忽蛟螭翔佳人佳人蹇誰與愛而不見心衋傷胡料院出示車攻圖仍索俚作九壤卧龍呼不起乳臭談兵空滿耳書生未識玉帳經且抱此圖究終始姬家出車詠嬴家小戎詩衛家武剛扞突騎馬家偏廂搴敵旗只今車陣無人識天狗横空灑腥血北人以鞍馬為家誰遇奔衝展竒策豫章先生今孔明胸中森羅萬甲兵天衡地軸妙絶識内陣外陣何縱横千枝緑沉列虓虎萬臂黄間張白羽人言險野難用車公獨規模掩前古車攻圖車攻説八采眉前曽進徹世人苦謗陳濤斜却向齊門空鼔瑟今朝朱幡冨川頭絶江川北瞻神州李綱政要講車戰南渡勲業應可收涇水黄鐵山碎雙輪快輾幽燕地朗誦先王疑是生復古篇他時此筆猶難繼壺中天歌贈侯明文葢頭即可居容膝即可安連雲大厦千萬間何如壺中宇宙寛壺中何所有筆牀茶竈葫蘆酒壺中何所為目送飛鴻揮五絲牕前祝融老僧竹壁上九疑狂客詩壺中主人知為誰談疑是啖棗仙伯雪鶴姿左攬𤣥微袂咲移砥柱弄河水右拍長房肩飽飡麟脯傾玉松疑誤蓬萊山在何處勸君且占壺中住不曽上列金馬門也應不識崖州路探禹穴浮沅湘脚下塵土鬢上霜我到壺中如故鄉謝揚孟溪縣丞惠以章墨白首侯芭蜀江邊曽向君家傳太𤣥射熊草賦留殘墨相應當日還渠得飄零蕭灑㡬世孫解得膠法舂𤣥雲物理往來元莫測後世子雲還舊壁君家所有更贈君君還贈我何慇懃感君慇懃復三歎努力西牕磨鐵硯太𤣥艱深我不為願寫誠齋易傳探𤣥機佳人兩章寄許東溪衡之山鬱蒼蒼我有佳人在山之陽木難為佩兮雲錦為裳愛而不見兮我心憂傷安得為鵾鵬凌風置君傍衡之山鬱蒼蒼衡之江清且漪我有佳人在江之湄朝飡菭蘠兮夕饌江蘺欲往從之兮我馬虺隤安得為琴高沿波與君随衡之江清且漪古體登濓溪太極樓岑樓跨層崖灌木翳頽沼曠哉宇宙心況兹展遐眺前哲日以遠川麓被文藻芳甸馥荃蘅枉渚雜鳬鳥亭亭沼中蓮冉冉庭下草扣寂參太極撫化領衆妙俗薄神理乖力柔聖途杳英英考亭翁反心㑹天奥萬里粲良言一誠貫元造朂哉登樓人畢景盡此道深根復深根篤行以為寶送程營道官滿赴闕高旻振爽籟蒼鴈鳴芳洲傾城餞茂宰鄉耋羅藻舟茂宰蘊淵道厥源溯伊流字甿振仁策範俗惇聖猷夷心灼理要政簡吏統周芳風被儒肆惠術淪農疇魯封有馴翟張廷無訟牛慨兹戒徂西離衷鬱綢繆贈我茂叔蓮紉君晏子裴慶霄􅕉鳳躍神囿瞻麟遊世道日以隘民瘼誰克瘳厲志抗遐業吹萬溥九州揆余忝皇鑒敷文勉征愁行行重行行夷庚無駐舟次韻李監丞月夕閔雨穜稑旱欲槁蒺藜秋向榮哲匠軫民瘵慨此夜魄明蓐收正秋斂肥遺何縱横仰霄􅕉蟾曜聆垤佇鶴鳴彼美玩華光芳樽酌麴生崇榭歌窈窕秀質羅輜軿節序孰不歡宅生念匪輕同胞正焦灼對酒何忍傾恤喜限惽智同兹感隂晴淰淰山雲起筞筞林飈驚企彼天瓢潤弭此農橰聲崇情發翰墨賞心謝籌觥溥澤乃夙念穹爵豈所營榮賤有異分感兹反巖耕次韻李監丞城西紀游叫舜問寥濶詠濓滌塵囂駕言城西游慨彼往哲遥儀鳳不可呼駕鵞浴清瀟懷或光風杳蕙若吹涼飈蒼梧隴雲愁廬阜大闕彫豈無人希周亦有文規姚佔畢末學陋俗薄神理銷沿流浮伊洛泝源窺羲堯執中與太極萬古瞻魁杓察㣲篤强力賢聖諫匪遼舜宫翳灌木濓塾棲叢苕觀乎紀游作悟彼進學條蘭卮娛才彦豈謂磊磈澆得深清賞愜理勝英藻超揆予果何為農野勤耕穮景迫昩見道曷奉徳化昭次韻李監丞同劉玉淵游七泉世變如流水前哲嗟逝川良牧隆化本訪古漫叟泉念兹名泉意感彼末俗偏淵竇與嵌臼杖屨聊回旋不識漫叟心曷誦漫叟篇惻念軫蒼氓溥澤同一天蟻聚與羔跪命義當亦堅回邪乃敗徳毋以巳欲專夸士五鼎辱穹爵或自纏臨流歎澆風薄言傾酒船浸泉旌吾志凍泉存舊傳潓􅪙涍汸淔銘石昭萬年無闕感發人黜彼敲墨氊歳月亦云久古迹埋塵煙泉根石已泐泉上樹欲仙森㦸呵虎士誰能聽潺湲理義著古今貴賤俱荒阡今公七泉游陵谷尚未遷勵俗振古道及兹誦惡圓劉侯同襟期𢋫唱揮彩椽漫叟或有知騎鯨躍層淵彼哉賊君父圓曲工求權厲民恣屠斮巧宦勤攀縁安得激七泉布作化雨宣送絅齋李監丞赴湖南提舉吏統久已紊使選匪易為蝎虺何蓁蓁鴻鴈何纍纍持節豈不多曠職茍所私緬懷紫陽翁昔使東浙湄陳臬糾官邪揚仁蘇民疲兹道有後先哲儒昭令規絅齋寄瀟牧邦懋灼帝知勵亷肅寮寀反税驩鄉耆所學藴淵道寛嚴權理宜兹總全楚境歌此皇華詩位穹民言邈壤廣吏蠧滋問俗職所重簡僚乃政基視聽貴遠周細㣲在可遺攬轡戒前路豈為好爵縻揆予忝英盼懷徳念别離别離彼何念康濟乃所期懿兹遠大業肇此咨度時朂哉振英采慰我湘民思秋夜感懷溽露沾灌莽華月流高旻唫笑嘉此夜撫化悲蕭辰蕭辰何所悲遊子多苦辛道峻悟力謝業遥昌志湮𤣥鬢日以變豐景將遂淪堪輿一大宅羲娥為旅人卉木互榮落蛩蟀何吟呻氣随稚耄變理勝䘏喜均反性樂天爵測化葆道真撫巻慨往哲芳猷藐難親雪磯叢稿巻一
