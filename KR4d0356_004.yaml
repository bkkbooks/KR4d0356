body:
  text: 雪磯叢稿巻四宋樂雷發撰七言絶句詠史六首髙祖逝騅走鹿各消磨劒外功臣剰㡬多四皓兩生元不聽故鄉枉費大風歌陳勝呉廣假號偷名只可憐枉抛錢鎛弄戈鋋壠頭燕雀應相笑鴻鵠元來是項燕韓信愁看鐘室劈良弓何不當時殺蒯通今日真王成底事只應娥姁是英雄東方朔蜥蜴盆邊解滑稽且分社肉飽蛾眉劉郎最怕秋風冷那聽君言撤殿帷司馬相如狗監無端薦薄情鸘裘犢鼻帝鄉塵當時最有文君恨不識長門買賦人班固請室寃魂叫不聞神丘隆碣漫遺文平生詞藻誰知巳腐䑕孤雛却悞君汴堤栁萬縷春風窣汴堤錦颿何處栁空垂流鶯應有兒孫在問著隋朝總不知讀李羣玉集光順門前繫馬吟𢎞文館裡翠雲春却憐白首河西尉枉作蓬萊獻賦人捐玦江頭弄釣舟菊花杜若滿芳洲如何才子無騷思只詠薔薇與石榴與復古叔讀横渠正䝉書惆悵枯林與晬盤雲横太白夢魂安半生驕吝如蝸縮自把西銘反覆看誰掘驪山起老師竹林燈火共心期年來後學輕前軰看徹臯比罷講時題楊從行湘詩巻楊即誠齋仙雲寒鎖碧瑶天突兀吟氊北斗邊試問鳳凰誰得髓竹林聽雪對牀眠叫雲吹玉舜祠邊醉嚼瓊糜漱石泉舊讀離騷今忘却快披秋巻嗅蘭荃次韻熊雲瀑秋夜見寄吟落秋牕燭炧紅想彈九辨入絲桐荃蘅豈不如葵菽誰繼豳風補楚風無題夭裠疑誤褒衣走浙淮何人不識鶴山來只今心印誰傳得自摺通書撥篆灰撫州偶題金柅亭邊栁拂城春風繫馬酒家吟塵埃滿面無人識却得黄鸝作賞音萍鄉病渴犬子無從典驌驦荒村忍得望瀟湘楚王萍實甘如蜜不許詩人取次嘗甲午社日客桂林卮酒豚蹄客裡歡石尤風𦂳枲衣單東陽病骨如鸚鵡最怯南州社日寒桂林歲晩憶鍾尚書塵滿湘翁薜荔衣江湖歳晚鬢成絲桂州楊五今何處雪片梅花枉費詩醉中偶成醉敲茶臼嘯秋煙苦欠高陽買酒錢擬入亂山餐柏葉石牀閒對麝香眠送友人游昭州呈陳謙之僉判閬仙去補荔支譜梅谷歸呈飛鶩秋惟有瓜坡共君在馬蹄何苦又昭州道鄉牽損衮龍衣謫墮天涯詠楚蘺莫放蹇驢游别處拾青閣下有殘碑鵬運堂前話别愁菭蘠三度楚江秋近懷莫向元龍道問舍求田是闕頭夏日偶書蜾蠃銜蟲入破牕枕書一垜竹方牀家童偶見草頭字誤認離騷是藥方秋日行邨路兒童籬落帶斜陽豆莢薑芽社内香一路稻花誰是主紅蜻蜓伴緑螳螂新淦偶成飛飛絲鳳掛梅梢猶記來時雪擁袍今日歸舟新淦路平頭稚子賣櫻桃贈呉季詩燕子樓頭一曲春曾騎驕馬擲黄金如今世事漫頭雪破屋孤燈忍凍吟演教寺弔樓居朱漕羅帶江頭蜕繡衣人歸香草謝家池祗今玉樹埋何處惆悵僧房認得詩穿塚難酧地下知逢人多説項斯詩今朝痛灑西州淚萬里梅花欲放時延真道院滄流翠竹接仙扃霛菜丹虬拱上真擬就𤣥翁分半榻閒聽秋雨守庚申訪趙愚齋不遇謁者云抵晚方歸因成一絶奉寄雪片梅花滿硯池芙蓉幕裡客歸遲今朝解了公家事儘聽轅門報酉時愚齋舊有詩云吾曹度日真堪愧又聽轅門報酉時史主簿以授菴習稿見示敬題其後并寄張宗瑞姜夔荒塚白蘋深鸑鷟無聲結緑沈擬向鄱陽尋後杜只招張叟聽君吟吟了南樓到庫樓塞雲邊月困雕鎪只今南北無詩禁曾有新編過境不術士醴陵丁夢營疑是榮或是宫將之舂陵有贈看盡槐花買卜人窊尊且認舊碑文只今世上無清惠却恐元郎解闕君渌水池邊舊釣磯何時歸去濯征衣千年城郭應無恙祗怕風塵老令威送歐陽平仲起鬱林教官快把詩書洗瘴茅雕題墨齒盡同胞天涯那得随衿佩試借椒堂講義鈔古來節婦比忠臣怊悵明珠一窖塵千古綱常君記取題詩煩問墜樓人萍鄉和王堯章韻征衲無人補舊綿蕭條客枕楚萍邊撥殘石炭西牕冷却憶山家榾柮烟趙司法詩集自題近道葢取工部所貽元隠居詩中語也闕道書二絶和徧陶翁飲酒詩醉籠天地入鴟夷細看官爵成何物肯帶奚囊過九疑浣花騷伯杳難闕世上寧無元隠居讀罷君詩三歎息斷絃緑綺定何如聽廬山胡道士彈離騷廬山道士玉潭仙前世滄浪握楚荃莫道離騷遺響絶孤鈞寡珥尚能傳弔湘誰解薦江蘺忠憤泠泠寫七絲愁絶九疑山下聽重華應許就敶詞題王堯章佇香亭滿池蜀錦照深衣盡日慿欄課楚詞要識此花香絶處露凉風細雨晴時對花味道興何長好學顔家到坐忘莫與紅塵兒軰道心清正自得真香故園荷屋傍濓溪苦愛蓮花入夢思今日題詩還自笑江湖塵土鬢成絲題昭州田廷亮書稿後㯽榔口裏吐參苓折檻無門九虎深家在道鄉亭畔住定應千古有知音少海無波鶴禁虛滿朝閉口養曹蜍白袍烏帽和寧外却有山人請建儲次韻熊雲瀑秋夜見寄叫徹蒼梧望八荒暮雲秋客各凄凉此情未許傍人㑹愁絶中庭月一方雪磯叢稿巻四
