body:
  text: 雪磯叢稿卷五宋樂雷發撰五言律詩訪伯父幽居對坐如禪舍間燒石乳香書看新講義藥問未傳方僕語梅花裏僧經竹葉傍題詩吾豈敢窗户半吟章桂林懷李景魏陽華萬疊雲無計得相尋所學皆時好何人知爾心莎城百粵遠雪嶠一翁吟已是懷人極天寒奈水深桂林送人之瓊州招捕海冦訾家洲畔路别爾苦匆匆説劒令人喜耽吟與我同旌旗楓鬼雨舟楫鱟簰風想到瓊峯頂題詩更紀功與李盤翁知縣登七星山弔石道士迭疑是疊嶂矗空青耽竒共一尋苔荒碑意古茗苦道情深有興梯蒼壁無才詠玉簮吟仙何處去我輩復登臨次韻史主簿雨夜見寄水長許由溪春寒入竹扉幾人聽夜雨惟我怯單衣樹罅青燈耿籬根白菌肥明朝有忙事推枕問漁磯道中逢老儒自蜀出丙穴魚應好曾經問釣磯干戈今未定城郭是耶非詩社尊黃髮侯門薄布衣乾坤嗟鼎沸見爾一歔欷時事時事如頽屋誰堪任棟梁國貧僧牒賤邊病檄書忙有分憂宗社無方出舉場未應王謝輩揮淚送斜陽逃户租帖名猶在何人納稅錢燒侵無主墓地占沒官田邊國干戈滿蠻州瘴癘偏不知攜老稚何處就豐年登江華寒亭到此腳跟酸千峰迥不看年深碑字淺日薄樹隂寒石罅巢蜂乳籬根墮鳥殘愛吟還畏嶮不敢倚闌干訪表叔李竹齋門庭接豆根吟避市塵喧每愛詩無敵應知學有源雲山供俎豆筆硯長兒孫愧我相過數秋風酒一樽擬長沙訪姚雪篷至永而返賦此為寄今傍南軒住應知理趣精通書多似易論語不言誠擬欲聽微論猶能慰别情江湖風浪隔腸斷楚鴻聲雨夜讀陸放翁集爐冷重吹火山房夜黯然濕薪添茭爇苦茗帶芎煎燈暗瀟江雨詩吟笠澤煙老仙何處去搔首弔塵編送黃天河天河那可到山頂翠參差村屋煎黃蠟官爐照疑是焙荔枝地蠻遊宦少縣小迓賔遲鼻祖曾吟處荒苔想滿碑呈趙叔愚司理門户垂楊句江湖半世看不應求五嶺却自建孤壇浙社朋遊盡鹿疑誤詩氣味寒今朝流水調只向子期彈夢訪劉漫塘魯雪巢二先生前輩風流歇江湖欠賞音向期行古道誰復識余心月浸金壇冷雲歸玉笥深瀟湘風雨夜客夢得相尋青湘逢廷對人歸因問時事南客帝鄉歸青袍照緑髭問知當世事解誦聖君詩淮蜀軍書急襄樊邸報遲空傳廷試策韋布説邊陲南林寺律院僧應俗庭荒草木刪無碑堪考古有客自看山竹好惟嫌密雲多不自間小溪知最近童浴夜方還銘象石銘有序九疑之麓為麗山有巖崩道厥石如象豫遊而愛之遂命之名而銘曰百獸出王象實孔偉有崩斯石惟象是似贔􅂒其形巉岹其齒我愛斯巖原象之美鍾竒日南邈爾荒裔服兮帝車維天子使相彼嵒阿濟濟多士缺教篤學峻履寶地任重致遠伊國之器地以人彰敢銘巖趾雪磯叢稿卷五
